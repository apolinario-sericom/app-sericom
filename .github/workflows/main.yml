name: Gerar APK Sericom

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixando o código da Sericom
        uses: actions/checkout@v4

      - name: 🐍 Configurando o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ☕ Configurando o Motor Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Configurando o Flutter (Motor Compatível)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: 📦 Instalando as peças
        run: pip install flet==0.25.2 supabase

      - name: 🚀 Construindo o Aplicativo (Modo Fofoqueiro)
        run: flet build apk . --product "Portal Sericom" --verbose

      - name: 📤 Salvando o APK Pronto!
        uses: actions/upload-artifact@v4
        with:
          name: App-Sericom-Instalador
          path: build/apk/**/*.apk
